<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Colour Clip Watch Admin</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    :root{--bg:#f7f1eb;--card:#fff;--line:#eadfd6;--text:#252127;--muted:#71676b;--deep:#302b3e;--accent:#d86f8f}
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}
    button,input,textarea,select{font:inherit}
    button{cursor:pointer}
    h1,h2,h3,h4{margin-top:0;color:var(--deep)}
    .muted{color:var(--muted)}
    .error{color:#b45309;font-weight:800}
    .hidden{display:none !important}

    /* Login */
    .login{min-height:100vh;display:grid;place-items:center;padding:24px}
    .login-card{width:min(420px,100%);padding:24px;background:var(--card);border:1px solid var(--line);border-radius:22px;box-shadow:0 16px 44px rgba(64,48,56,.08)}
    .field{display:grid;gap:7px;margin-bottom:12px}
    label{font-weight:800;color:#463c44}
    input,textarea,select{width:100%;border:1px solid var(--line);border-radius:14px;padding:12px;background:#fff;color:var(--text)}
    .btn{border:0;border-radius:999px;padding:12px 18px;font-weight:900;background:var(--deep);color:#fff}
    .btn.secondary{background:#fff;color:var(--deep);border:1px solid var(--line)}
    .btn.small{padding:8px 14px;font-size:13px}
    .status{margin-top:12px;color:var(--muted);font-weight:700}

    /* App shell */
    .app{display:none;min-height:100vh;flex-direction:column}
    .topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:14px 22px;background:var(--card);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:10}
    .brand{font-size:18px;font-weight:900;color:var(--deep)}
    .tabs{display:flex;gap:8px}
    .tab{border:1px solid var(--line);background:#fff;color:var(--muted);border-radius:999px;padding:10px 18px;font-weight:800}
    .tab.active{background:var(--deep);color:#fff;border-color:var(--deep)}
    .content{flex:1;padding:18px 22px}
    .view{display:none}
    .view.active{display:block}

    /* Home editor */
    .editor-bar{display:flex;align-items:center;gap:14px;margin-bottom:14px;flex-wrap:wrap}
    .editor-hint{color:var(--muted);font-size:13px}
    .frame-wrap{border:1px solid var(--line);border-radius:18px;overflow:hidden;background:#fff;box-shadow:0 12px 30px rgba(64,48,56,.08)}
    #home-editor-frame{width:100%;height:calc(100vh - 190px);border:0;display:block}

    /* Orders */
    .orders-layout{display:grid;grid-template-columns:minmax(300px,.8fr) minmax(440px,1.2fr);gap:18px}
    .panel{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px}
    table{width:100%;border-collapse:collapse}
    th,td{border-bottom:1px solid var(--line);padding:10px;text-align:left;font-size:13px;vertical-align:middle}
    th{color:var(--muted);font-weight:800}
    .order-row{cursor:pointer}
    .order-row:hover{background:#faf5ef}
    .detail-toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px}

    /* White order confirmation card (first version style) */
    .confirmation-card{background:#ffffff;color:#1f1b22;border:1px solid #ece3da;border-radius:16px;padding:28px;max-width:620px;font-size:14px;line-height:1.5}
    .confirmation-card h2{font-size:22px;margin:0 0 4px}
    .confirmation-card .card-sub{color:#8a7f86;font-size:13px;margin:0 0 20px}
    .cc-section{border-top:1px solid #eee3d9;padding:16px 0}
    .cc-section:first-of-type{border-top:0;padding-top:0}
    .cc-section h3{font-size:14px;text-transform:uppercase;letter-spacing:.04em;color:#9a8d94;margin:0 0 12px}
    .cc-rows{display:grid;gap:7px}
    .cc-row{display:flex;justify-content:space-between;gap:16px}
    .cc-row span{color:#6f656b}
    .cc-row b{color:#1f1b22;text-align:right}
    .cc-row.total b{font-size:16px}
    .cc-item{display:flex;gap:14px;padding:12px 0;border-bottom:1px dashed #efe5db}
    .cc-item:last-child{border-bottom:0}
    .cc-item img{width:72px;height:72px;border-radius:12px;object-fit:cover;background:#f1eae3;flex:none}
    .cc-item-body{flex:1;display:grid;gap:4px}
    .cc-item-name{font-weight:800}
    .cc-item-meta{color:#6f656b;font-size:13px;display:flex;justify-content:space-between;gap:12px}

    @media(max-width:900px){.orders-layout{grid-template-columns:1fr}.tabs{flex:1;justify-content:center}}
  </style>
</head>
<body>
  <!-- Login -->
  <section class="login" id="loginView">
    <div class="login-card">
      <h1>Admin Login</h1>
      <p class="muted">Enter the admin password configured in Vercel.</p>
      <div class="field">
        <label for="adminPassword">Password</label>
        <input id="adminPassword" type="password" autocomplete="current-password" />
      </div>
      <button class="btn" id="loginButton">Login</button>
      <div class="status error" id="loginStatus"></div>
    </div>
  </section>

  <!-- App -->
  <section class="app" id="appView">
    <header class="topbar">
      <div class="brand">Colour Clip Admin</div>
      <nav class="tabs">
        <button class="tab active" data-view="home">Home Editor</button>
        <button class="tab" data-view="orders">Orders</button>
      </nav>
      <button class="btn secondary small" id="logoutButton">Log out</button>
    </header>

    <div class="content">
      <!-- Home Editor -->
      <section class="view active" id="home">
        <div class="editor-bar">
          <button class="btn" id="saveHomeButton">Save Home Page</button>
          <span class="editor-hint">Hover any text or image on the page below, click to edit, then save.</span>
          <span class="status" id="homeStatus"></span>
        </div>
        <div class="frame-wrap">
          <iframe id="home-editor-frame" src="/?admin_edit=1" title="Home page editor"></iframe>
        </div>
      </section>

      <!-- Orders -->
      <section class="view" id="orders">
        <div class="editor-bar">
          <button class="btn secondary" id="refreshOrdersButton">Refresh orders</button>
          <span class="status" id="ordersStatus"></span>
        </div>
        <div class="orders-layout">
          <div class="panel">
            <table>
              <thead><tr><th>Order</th><th>Name</th><th>Total</th><th>Status</th></tr></thead>
              <tbody id="ordersTable"><tr><td colspan="4" class="muted">No orders loaded yet.</td></tr></tbody>
            </table>
          </div>
          <div class="panel" id="orderDetail">
            <p class="muted">Select an order to view the confirmation card.</p>
          </div>
        </div>
      </section>
    </div>
  </section>

  <script>
    const ORDER_STATUSES = ["New","Confirmed","Pending Payment","Paid","Processing","Shipped","Completed","Cancelled"];
    const PLACEHOLDER_IMG = "data:image/svg+xml;utf8," + encodeURIComponent(
      "<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><rect width='100%' height='100%' fill='#f1eae3'/><text x='50%' y='50%' font-family='Arial' font-size='12' fill='#a9999f' text-anchor='middle' dominant-baseline='middle'>No image</text></svg>"
    );

    let adminToken = localStorage.getItem("ccwAdminToken") || "";
    let orders = [];
    let siteConfig = null;       // public site config (for product image fallback)
    let homeConfig = null;       // latest config edited in the iframe

    const money = (value) => "€" + Number(value || 0).toFixed(2);
    const escapeHtml = (value) => String(value ?? "").replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

    function authHeaders(extra = {}) {
      return { "Content-Type": "application/json", Authorization: "Bearer " + adminToken, ...extra };
    }

    function showLogin() {
      document.getElementById("appView").style.display = "none";
      document.getElementById("loginView").style.display = "grid";
    }

    function enterApp() {
      document.getElementById("loginView").style.display = "none";
      document.getElementById("appView").style.display = "flex";
      loadSiteConfig();
      loadOrders();
    }

    function handleUnauthorized() {
      adminToken = "";
      localStorage.removeItem("ccwAdminToken");
      document.getElementById("loginStatus").textContent = "Your session expired. Please log in again.";
      showLogin();
    }

    // ---- Auth ----
    async function login() {
      const password = document.getElementById("adminPassword").value;
      const status = document.getElementById("loginStatus");
      status.textContent = "";
      try {
        const response = await fetch("/api/admin/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ password })
        });
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || "Login failed");
        adminToken = data.token;
        localStorage.setItem("ccwAdminToken", adminToken);
        document.getElementById("adminPassword").value = "";
        enterApp();
      } catch (error) {
        status.textContent = error.message;
      }
    }

    function logout() {
      adminToken = "";
      localStorage.removeItem("ccwAdminToken");
      showLogin();
    }

    // ---- Tabs ----
    function showView(id) {
      document.querySelectorAll(".view").forEach((view) => view.classList.toggle("active", view.id === id));
      document.querySelectorAll(".tab").forEach((tab) => tab.classList.toggle("active", tab.dataset.view === id));
    }

    // ---- Home editor ----
    async function loadSiteConfig() {
      try {
        const response = await fetch("/api/site-config");
        const data = await response.json();
        if (response.ok) siteConfig = data.config || null;
      } catch (error) { /* product image fallback is optional */ }
    }

    window.addEventListener("message", (event) => {
      if (event.source !== document.getElementById("home-editor-frame").contentWindow) return;
      if (event.data && event.data.type === "ccw:config") {
        homeConfig = event.data.config;
      }
    });

    async function saveHomePage() {
      const status = document.getElementById("homeStatus");
      if (!homeConfig) {
        status.textContent = "Editor is still loading, please try again in a moment.";
        return;
      }
      status.textContent = "Saving…";
      try {
        const response = await fetch("/api/site-config", {
          method: "POST",
          headers: authHeaders(),
          body: JSON.stringify({ config: homeConfig })
        });
        if (response.status === 401) return handleUnauthorized();
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || "Save failed");
        siteConfig = data.config || homeConfig;
        status.textContent = "Saved.";
      } catch (error) {
        status.textContent = error.message;
      }
    }

    // ---- Orders ----
    async function loadOrders() {
      const status = document.getElementById("ordersStatus");
      status.textContent = "Loading…";
      try {
        const response = await fetch("/api/orders", { headers: { Authorization: "Bearer " + adminToken } });
        if (response.status === 401) return handleUnauthorized();
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || "Orders failed");
        orders = data.orders || [];
        status.textContent = orders.length ? "" : "No orders yet.";
        renderOrders();
      } catch (error) {
        status.textContent = "";
        document.getElementById("ordersTable").innerHTML = `<tr><td colspan="4" class="error">${escapeHtml(error.message)}</td></tr>`;
      }
    }

    function renderOrders() {
      const tbody = document.getElementById("ordersTable");
      if (!orders.length) {
        tbody.innerHTML = `<tr><td colspan="4" class="muted">No orders yet.</td></tr>`;
        return;
      }
      tbody.innerHTML = orders.map((order, index) => `
        <tr class="order-row" onclick="showOrder(${index})">
          <td><b>${escapeHtml(order.orderNumber)}</b></td>
          <td>${escapeHtml(order.customer?.fullName || "")}</td>
          <td>${money(order.total)}</td>
          <td>${escapeHtml(order.status || "New")}</td>
        </tr>
      `).join("");
    }

    function productImageFor(item) {
      return item?.image || siteConfig?.product?.mainImageUrl || PLACEHOLDER_IMG;
    }

    function showOrder(index) {
      const order = orders[index];
      const date = order.createdAt ? new Date(order.createdAt).toLocaleString() : "";
      const items = (order.items || []).map((item) => `
        <div class="cc-item">
          <img crossorigin="anonymous" src="${escapeHtml(productImageFor(item))}" alt="${escapeHtml(item.productName || "Product")}" />
          <div class="cc-item-body">
            <div class="cc-item-name">${escapeHtml(item.productName || "Colour Clip Watch")}</div>
            <div class="cc-item-meta"><span>Colour</span><b>${escapeHtml(item.colour || "")}</b></div>
            <div class="cc-item-meta"><span>Quantity</span><b>${escapeHtml(item.quantity ?? "")}</b></div>
            <div class="cc-item-meta"><span>Unit Price</span><b>${money(item.unitPrice)}</b></div>
            <div class="cc-item-meta"><span>Line Total</span><b>${money(item.lineTotal)}</b></div>
          </div>
        </div>
      `).join("");

      document.getElementById("orderDetail").innerHTML = `
        <div class="detail-toolbar">
          <button class="btn small" onclick="copyOrderImage()">Copy Image</button>
          <button class="btn secondary small" onclick="downloadOrderImage('${escapeHtml(order.orderNumber)}')">Download Image</button>
          <select class="btn secondary small" style="padding:8px 12px" onchange="updateStatus('${escapeHtml(order.orderNumber)}', this.value)">
            ${ORDER_STATUSES.map((status) => `<option ${status === order.status ? "selected" : ""}>${status}</option>`).join("")}
          </select>
          <span class="status" id="exportStatus"></span>
        </div>

        <div class="confirmation-card" id="confirmation-card-export">
          <h2>Order Confirmation</h2>
          <p class="card-sub">Thank you for your order.</p>

          <div class="cc-section">
            <h3>Order Summary</h3>
            <div class="cc-rows">
              <div class="cc-row"><span>Order Number</span><b>${escapeHtml(order.orderNumber)}</b></div>
              <div class="cc-row"><span>Order Date</span><b>${escapeHtml(date)}</b></div>
              <div class="cc-row"><span>Status</span><b>${escapeHtml(order.status || "New")}</b></div>
              <div class="cc-row"><span>Payment Method</span><b>${escapeHtml(order.paymentMethod || "")}</b></div>
              <div class="cc-row"><span>Subtotal</span><b>${money(order.subtotal)}</b></div>
              <div class="cc-row"><span>Payment Fee</span><b>${money(order.paymentFee)}</b></div>
              <div class="cc-row total"><span>Order Total</span><b>${money(order.total)}</b></div>
            </div>
          </div>

          <div class="cc-section">
            <h3>Items</h3>
            ${items || '<p class="muted">No items.</p>'}
          </div>

          <div class="cc-section">
            <h3>Customer Details</h3>
            <div class="cc-rows">
              <div class="cc-row"><span>Full Name</span><b>${escapeHtml(order.customer?.fullName || "")}</b></div>
              <div class="cc-row"><span>Email</span><b>${escapeHtml(order.customer?.email || "")}</b></div>
              <div class="cc-row"><span>Phone Number</span><b>${escapeHtml(order.customer?.phone || "")}</b></div>
            </div>
          </div>

          <div class="cc-section">
            <h3>Shipping Address</h3>
            <div class="cc-rows">
              <div class="cc-row"><span>Address Line 1</span><b>${escapeHtml(order.shipping?.address1 || "")}</b></div>
              <div class="cc-row"><span>City</span><b>${escapeHtml(order.shipping?.city || "")}</b></div>
              <div class="cc-row"><span>State / Province / Region</span><b>${escapeHtml(order.shipping?.state || "")}</b></div>
              <div class="cc-row"><span>Postcode / ZIP Code</span><b>${escapeHtml(order.shipping?.postcode || "")}</b></div>
              <div class="cc-row"><span>Country</span><b>${escapeHtml(order.shipping?.country || "")}</b></div>
            </div>
          </div>
        </div>
      `;
    }

    async function updateStatus(orderNumber, status) {
      try {
        const response = await fetch("/api/orders", {
          method: "PATCH",
          headers: authHeaders(),
          body: JSON.stringify({ orderNumber, status })
        });
        if (response.status === 401) return handleUnauthorized();
        if (response.ok) await loadOrders();
      } catch (error) { /* ignore */ }
    }

    async function renderCardCanvas() {
      const node = document.getElementById("confirmation-card-export");
      return html2canvas(node, { scale: 2, backgroundColor: "#ffffff", useCORS: true });
    }

    async function copyOrderImage() {
      const status = document.getElementById("exportStatus");
      try {
        const canvas = await renderCardCanvas();
        const blob = await new Promise((resolve) => canvas.toBlob(resolve, "image/png"));
        if (!navigator.clipboard || !window.ClipboardItem) {
          status.textContent = "Copy image is not supported in this browser.";
          return;
        }
        await navigator.clipboard.write([new ClipboardItem({ "image/png": blob })]);
        status.textContent = "Image copied to clipboard.";
      } catch (error) {
        status.textContent = "Copy image is not supported in this browser.";
      }
    }

    async function downloadOrderImage(orderNumber) {
      const status = document.getElementById("exportStatus");
      try {
        const canvas = await renderCardCanvas();
        const link = document.createElement("a");
        link.download = `order-confirmation-${orderNumber}.png`;
        link.href = canvas.toDataURL("image/png");
        link.click();
        status.textContent = "Image downloaded.";
      } catch (error) {
        status.textContent = "Download failed.";
      }
    }

    // ---- Wiring ----
    document.getElementById("loginButton").addEventListener("click", login);
    document.getElementById("adminPassword").addEventListener("keydown", (event) => { if (event.key === "Enter") login(); });
    document.getElementById("logoutButton").addEventListener("click", logout);
    document.getElementById("saveHomeButton").addEventListener("click", saveHomePage);
    document.getElementById("refreshOrdersButton").addEventListener("click", loadOrders);
    document.querySelectorAll(".tab").forEach((tab) => tab.addEventListener("click", () => showView(tab.dataset.view)));

    // Keep session across refreshes: if we already have a token, go straight in.
    if (adminToken) enterApp();
    else showLogin();
  </script>
</body>
</html>
